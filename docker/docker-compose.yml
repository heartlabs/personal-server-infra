services:
  nginx:
    ports:
      - "443:443"
      - "80:80"
      - "3537:3537"
      - "3030:3030"
    volumes:
      - ./html:/usr/share/nginx/html
      - /home/server/bugchess/html:/usr/share/nginx/bugchess
      - ./nginx:/etc/nginx/conf.d
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    image: nginx
    restart: unless-stopped
    command: "/bin/sh -c 'while :; do sleep 6h & wait $${!}; nginx -s reload; done & nginx -g \"daemon off;\"'"
    networks:
      - needs-network
      - bugchess-network
      - blog-network
  certbot:
    image: certbot/certbot
    restart: unless-stopped
    networks:
      - needs-network
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
  grav:
    image: getgrav/grav:latest
    container_name: grav
    environment:
      - FIX_PERMISSIONS=true
    restart: unless-stopped
    volumes:
      - grav_data:/var/www/html
      - ./grav/install-plugins.sh:/docker-entrypoint.d/install-plugins.sh:ro
    networks:
      - blog-network

volumes:
  grav_data:

networks:
  needs-network:
    name: needs_network
    external: true
  bugchess-network:
    name: bugchess_network
    external: true
  blog-network:
