name: Game Infrastructure

on:
  push:
    branches: [ main ]
    paths:
      - ".github/workflows/game-infrastructure.yml"
      - "docker/**"

env:
  CARGO_TERM_COLOR: always

jobs:
  docker:
    runs-on: ubuntu-latest
    environment: heartlabs.tech
    steps:
    - uses: actions/checkout@v2
    - name: free disk space before deploy
      uses: appleboy/ssh-action@v0.1.10
      with:
        host: v2202204174441188151.happysrv.de
        username: ${{ secrets.DEPLOY_USER }}
        password: ${{ secrets.DEPLOY_USER_PASSWORD }}
        script: docker system prune -af
    - name: copy docker-compose files via ssh
      uses: appleboy/scp-action@master
      with:
        host: v2202204174441188151.happysrv.de
        username: ${{ secrets.DEPLOY_USER }}
        password: ${{ secrets.DEPLOY_USER_PASSWORD }}
        source: "docker/*"
        target: "/home/server/docker"
        strip_components: 1
        debug: true
    - name: deploy and ensure SSL
      uses: appleboy/ssh-action@v0.1.10
      with:
        host: v2202204174441188151.happysrv.de
        username: ${{ secrets.DEPLOY_USER }}
        password: ${{ secrets.DEPLOY_USER_PASSWORD }}
        script: |
          cd /home/server/docker
          docker compose pull
          docker compose build
          docker compose run --rm --entrypoint "" certbot certbot certonly --webroot -w /var/www/certbot \
            --non-interactive --agree-tos --email neidhart.orlich@gmail.com \
            --cert-name heartlabs.eu-0001 --keep-until-expiring \
            -d heartlabs.eu -d www.heartlabs.eu -d needs.heartlabs.eu -d blog.heartlabs.eu
          docker compose up -d --remove-orphans --force-recreate
          docker compose exec -T nginx nginx -s reload

    
